name: Bug report
description: Report a reproducible problem with SyncLab.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SyncLab. Please provide a minimal scenario and replay seed when possible. Remove credentials and sensitive application data from traces before attaching them.

  - type: input
    id: synclab-version
    attributes:
      label: SyncLab version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v24.x.x
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Ubuntu 24.04, macOS 15, or Windows 11
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Minimal scenario
      description: Include the smallest YAML scenario or library call that reproduces the problem.
      render: yaml
    validations:
      required: true

  - type: input
    id: seed
    attributes:
      label: Seed or replay command
      description: Provide the seed, trace event, or exact `synclab replay` command.
      placeholder: synclab replay .synclab/runs/example/trace.jsonl

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste the smallest useful log or trace excerpt. Do not include secrets.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed credentials and sensitive data from the report and attachments.
          required: true
