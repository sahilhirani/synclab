name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Verify and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.x"
          package-manager-cache: false

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v${package_version}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${package_version}." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: npm run check

      - name: Verify npm package contents
        run: npm run pack:verify

      # npm publishing is intentionally omitted until npm Trusted Publishing is configured.
      - name: Build package archive and checksum
        shell: bash
        run: |
          npm pack
          sha256sum synclab-*.tgz > SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: synclab-${{ github.ref_name }}
          path: |
            synclab-*.tgz
            SHA256SUMS
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" synclab-*.tgz SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              synclab-*.tgz \
              SHA256SUMS \
              --verify-tag \
              --title "SyncLab $GITHUB_REF_NAME" \
              --generate-notes
          fi
