name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node:
          - "22.14.0"
          - "24.x"
          - "26.x"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, test, and build
        run: npm run check

      - name: Verify npm package contents
        if: matrix.node == '24.x'
        run: npm run pack:verify

  platform:
    name: Determinism on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify deterministic replay
        run: npm run test:determinism

      - name: Run examples
        run: node scripts/test-examples.mjs

  required:
    name: required
    if: ${{ always() }}
    needs: [check, platform]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          CHECK_RESULT: ${{ needs.check.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
        run: test "$CHECK_RESULT" = success && test "$PLATFORM_RESULT" = success
