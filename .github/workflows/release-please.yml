name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_please:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Create or update release pull request
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package:
    name: Package GitHub release
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.x"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: npm run check

      - name: Verify npm package contents
        run: npm run pack:verify

      # npm publishing is intentionally omitted until npm Trusted Publishing is configured.
      - name: Build package archive
        run: |
          npm pack
          sha256sum synclab-*.tgz > SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: synclab-${{ needs.release_please.outputs.tag_name }}
          path: |
            synclab-*.tgz
            SHA256SUMS
          if-no-files-found: error
          retention-days: 90

      - name: Attach package to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" synclab-*.tgz SHA256SUMS --clobber
